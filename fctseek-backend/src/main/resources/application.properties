spring.application.name=fctseek-backend

# Servidor
server.port=8080

# Base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/fctseek
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=MiClaveSecretaMuyLargaParaFCTSeekQueDebeSerAlMenos256BitsParaHS256AlgorithmYQueSeaSegura2026
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.fctseek=DEBUG
logging.level.org.springframework.security=INFO

# (JSON)
spring.jackson.time-zone=Europe/Madrid
